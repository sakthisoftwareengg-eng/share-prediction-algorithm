<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 via-blue-900 to-slate-900 py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8 bg-white/5 backdrop-blur-sm border border-blue-500/30 rounded-xl p-8">
    <div>
      <div class="flex justify-center items-center">
        <mat-icon class="h-12 w-12 text-blue-400">bar_chart</mat-icon>
      </div>
      <h2 class="mt-6 text-center text-3xl font-extrabold text-white">
        Login
      </h2>
    </div>
    <form class="mt-8 space-y-6" (ngSubmit)="onSubmit()">
      <div class="rounded-md shadow-sm -space-y-px">
        <div>
          <label for="username" class="sr-only">Username</label>
          <input 
            id="username" 
            name="username" 
            type="text" 
            required 
            class="appearance-none rounded-none relative block w-full px-3 py-2 border border-blue-500/30 bg-white/5 placeholder-gray-300 text-white rounded-t-md focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm" 
            placeholder="Username" 
            [(ngModel)]="username"
            autocomplete="username"
          />
        </div>
        <div>
          <label for="password" class="sr-only">Password</label>
          <input 
            id="password" 
            name="password" 
            type="password" 
            required 
            class="appearance-none rounded-none relative block w-full px-3 py-2 border border-blue-500/30 bg-white/5 placeholder-gray-300 text-white rounded-b-md focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm" 
            placeholder="Password" 
            [(ngModel)]="password"
            autocomplete="current-password"
          />
        </div>
      </div>

      <div *ngIf="errorMessage" class="rounded-md bg-red-500/10 p-4 border border-red-500/20">
        <div class="flex">
          <div class="flex-shrink-0">
            <mat-icon class="h-5 w-5 text-red-400">error</mat-icon>
          </div>
          <div class="ml-3">
            <h3 class="text-sm font-medium text-red-300">Error</h3>
            <div class="mt-2 text-sm text-red-200">
              <p>{{ errorMessage }}</p>
            </div>
          </div>
        </div>
      </div>

      <div>
        <button 
          type="submit" 
          class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors"
          [disabled]="isLoading"
        >
          <span *ngIf="!isLoading">Sign in</span>
          <span *ngIf="isLoading">Signing in...</span>
        </button>
      </div>

    </form>
  </div>
</div>
